<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School District 87 - Live Translation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #542a7d 0%, #3d1f5c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border-bottom: 4px solid #FCBA03;
    }

    .title {
      font-size: 1.8rem;
      font-weight: bold;
      color: #FCBA03;
    }

    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    select {
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid #FCBA03;
      font-size: 1rem;
      background: white;
      cursor: pointer;
      font-weight: bold;
    }

    .toggle-btn {
      background: rgba(252, 186, 3, 0.2);
      color: #FCBA03;
      border: 2px solid #FCBA03;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .toggle-btn:hover {
      background: #FCBA03;
      color: #542a7d;
    }

    .start-btn {
      background: #FCBA03;
      color: #542a7d;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .start-btn:hover {
      background: #e3a803;
    }

    .start-btn.listening {
      background: #f44336;
      color: white;
    }

    .start-btn.listening:hover {
      background: #da190b;
    }

    .start-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px;
      overflow-y: auto;
    }

    .translation-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 3px solid #FCBA03;
    }

    .translation-box.dual-view {
      margin-bottom: 15px;
      padding: 25px;
    }

    .label {
      font-size: 0.9rem;
      font-weight: bold;
      color: #542a7d;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .text-content {
      font-size: 2.5rem;
      line-height: 1.4;
      color: #333;
      min-height: 60px;
    }

    .text-content.dual {
      font-size: 1.8rem;
    }

    .status {
      text-align: center;
      color: #FCBA03;
      font-size: 1.2rem;
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      border: 2px solid #FCBA03;
    }

    .mic-icon {
      display: inline-block;
      animation: pulse 1.5s infinite;
      margin-left: 10px;
      color: #FCBA03;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .instructions {
      background: rgba(252, 186, 3, 0.2);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 40px;
      text-align: center;
      border: 2px solid #FCBA03;
      font-weight: bold;
    }

    .error-message {
      background: rgba(255, 0, 0, 0.2);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 40px;
      text-align: center;
      border: 2px solid #ff0000;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .text-content {
        font-size: 1.5rem;
      }
      .text-content.dual {
        font-size: 1.2rem;
      }
      .title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🌐 School District 87 - Live Translation</div>
    <div class="controls">
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh-CN">Mandarin</option>
        <option value="ar">Arabic</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="it">Italian</option>
        <option value="vi">Vietnamese</option>
      </select>
      <button class="toggle-btn" onclick="toggleView()">
        <span id="viewToggleText">Show Both Languages</span>
      </button>
      <button class="start-btn" id="startBtn" onclick="toggleListening()">
        START LISTENING
      </button>
    </div>
  </div>

  <div class="instructions" id="instructions">
    Click "START LISTENING" and allow microphone access. Speak in English and see live translations appear below.
  </div>

  <div class="display-area" id="displayArea">
    <div class="translation-box" id="translationBox">
      <div class="label">Translation</div>
      <div class="text-content" id="translatedText">Translation will appear here...</div>
    </div>
  </div>

  <div class="status" id="status" style="display: none;"></div>

  <script>
    let recognition;
    let isListening = false;
    let showBothLanguages = false;
    let currentSentence = "";
    let lastTranslatedSentence = "";

    // Check browser support
    window.addEventListener('load', function() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        document.getElementById('instructions').innerHTML = 
          '⚠️ Your browser does not support speech recognition. Please use Chrome, Edge, or Safari.';
        document.getElementById('startBtn').disabled = true;
      }
    });

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = function() {
        console.log('Speech recognition started');
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').innerHTML = '🎤 Listening... <span class="mic-icon">●</span>';
        document.getElementById('instructions').style.display = 'none';
      };

      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          } else {
            interimTranscript += transcript;
          }
        }

        if (finalTranscript) {
          currentSentence = finalTranscript.trim();
          if (currentSentence && currentSentence !== lastTranslatedSentence) {
            lastTranslatedSentence = currentSentence;
            translateSentence(currentSentence);
          }
        }
      };

      recognition.onerror = function(event) {
        console.error('Speech recognition error:', event.error);
        if (event.error === 'not-allowed' || event.error === 'permission-denied') {
          document.getElementById('status').innerHTML = 
            '⚠️ Microphone access denied. Please allow microphone access in your browser settings and refresh the page.';
          document.getElementById('status').style.display = 'block';
          stopListening();
        } else if (event.error === 'no-speech') {
          console.log('No speech detected, continuing...');
        } else if (event.error === 'network') {
          console.log('Network error, continuing...');
        }
      };

      recognition.onend = function() {
        console.log('Recognition ended');
        if (isListening) {
          try {
            recognition.start();
          } catch (error) {
            console.error('Error restarting recognition:', error);
            stopListening();
          }
        }
      };
    }

    async function toggleListening() {
      if (!isListening) {
        await startListening();
      } else {
        stopListening();
      }
    }

    async function startListening() {
      try {
        // Request microphone permission explicitly
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
        
        // Initialize and start speech recognition
        if (!recognition) {
          initRecognition();
        }
        
        recognition.start();
        isListening = true;
        const btn = document.getElementById('startBtn');
        btn.textContent = 'STOP LISTENING';
        btn.classList.add('listening');
      } catch (error) {
        console.error('Error accessing microphone:', error);
        let errorMessage = 'Could not access microphone. ';
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          errorMessage += 'Please allow microphone access when prompted and try again.';
        } else if (error.name === 'NotFoundError') {
          errorMessage += 'No microphone found. Please connect a microphone and try again.';
        } else {
          errorMessage += error.message;
        }
        
        document.getElementById('instructions').innerHTML = '⚠️ ' + errorMessage;
        document.getElementById('instructions').className = 'error-message';
        document.getElementById('instructions').style.display = 'block';
      }
    }

    function stopListening() {
      if (recognition) {
        recognition.stop();
      }
      isListening = false;
      const btn = document.getElementById('startBtn');
      btn.textContent = 'START LISTENING';
      btn.classList.remove('listening');
      document.getElementById('status').style.display = 'none';
      document.getElementById('instructions').style.display = 'block';
      document.getElementById('instructions').className = 'instructions';
      document.getElementById('instructions').innerHTML = 
        'Click "START LISTENING" and allow microphone access. Speak in English and see live translations appear below.';
    }

    async function translateSentence(text) {
      const targetLanguage = document.getElementById('languageSelect').value;
      
      try {
        // Using MyMemory Translation API (free, no API key needed)
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLanguage}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.responseStatus === 200 && data.responseData) {
          const translatedText = data.responseData.translatedText;
          displayTranslation(text, translatedText);
        } else {
          console.error('Translation error:', data);
        }
      } catch (error) {
        console.error('Translation API error:', error);
      }
    }

    function displayTranslation(originalText, translatedText) {
      if (showBothLanguages) {
        document.getElementById('displayArea').innerHTML = `
          <div class="translation-box dual-view">
            <div class="label">English (Original)</div>
            <div class="text-content dual">${originalText}</div>
          </div>
          <div class="translation-box dual-view">
            <div class="label">Translation</div>
            <div class="text-content dual">${translatedText}</div>
          </div>
        `;
      } else {
        document.getElementById('translatedText').textContent = translatedText;
      }
    }

    function toggleView() {
      showBothLanguages = !showBothLanguages;
      const toggleText = document.getElementById('viewToggleText');
      
      if (showBothLanguages) {
        toggleText.textContent = 'Show Translation Only';
        document.getElementById('displayArea').innerHTML = `
          <div class="translation-box dual-view">
            <div class="label">English (Original)</div>
            <div class="text-content dual" id="originalText">Original will appear here...</div>
          </div>
          <div class="translation-box dual-view">
            <div class="label">Translation</div>
            <div class="text-content dual" id="translatedText">Translation will appear here...</div>
          </div>
        `;
      } else {
        toggleText.textContent = 'Show Both Languages';
        document.getElementById('displayArea').innerHTML = `
          <div class="translation-box" id="translationBox">
            <div class="label">Translation</div>
            <div class="text-content" id="translatedText">Translation will appear here...</div>
          </div>
        `;
      }
    }
  </script>
</body>
</html>
