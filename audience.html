<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Translation - District 87</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #542a7d 0%, #3d1f5c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .header {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      text-align: center;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 2px solid #FCBA03;
    }

    .title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #FCBA03;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    }

    .pin-entry {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .pin-input {
      padding: 15px;
      font-size: 1.5rem;
      text-align: center;
      border: 3px solid #542a7d;
      border-radius: 10px;
      letter-spacing: 8px;
    }

    .join-btn, .confirm-btn {
      background: #FCBA03;
      color: #542a7d;
      border: none;
      padding: 15px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }

    .join-btn:hover, .confirm-btn:hover {
      background: #e3a803;
    }

    .language-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .language-option {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .language-option:hover {
      border-color: #542a7d;
      background: #f5f5f5;
    }

    .language-option.selected {
      border-color: #542a7d;
      background: #542a7d;
      color: white;
      border-width: 3px;
    }

    .language-option input[type="radio"] {
      width: 20px;
      height: 20px;
    }

    .translation-display {
      background: white;
      border-radius: 15px;
      padding: 30px;
      min-height: 200px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    }

    .language-label {
      color: #542a7d;
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .translation-text {
      font-size: 1.8rem;
      line-height: 1.5;
      color: #333;
      min-height: 100px;
    }

    .status-indicator {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      font-weight: bold;
    }

    .status-indicator.connected {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
      border: 2px solid #4CAF50;
    }

    .status-indicator.disconnected {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 2px solid #f44336;
    }

    .error-message {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      border: 2px solid #f44336;
    }

    .label {
      color: #542a7d;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    #pinEntry, #languageSelection, #translationView {
      display: none;
    }

    #pinEntry.active, #languageSelection.active, #translationView.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🌐 School District 87 Translation</div>
  </div>

  <!-- PIN Entry Screen -->
  <div id="pinEntry" class="active">
    <div class="card">
      <div class="label">Enter Session PIN</div>
      <div class="pin-entry">
        <input type="text" id="pinInput" class="pin-input" placeholder="____" maxlength="4" pattern="[0-9]*" inputmode="numeric">
        <button class="join-btn" onclick="joinSession()">JOIN SESSION</button>
      </div>
      <div id="pinError" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <!-- Language Selection Screen -->
  <div id="languageSelection">
    <div class="card">
      <div class="label">Select Your Language</div>
      <div class="language-grid">
        <label class="language-option">
          <input type="radio" name="language" value="pt" onchange="selectLanguage(this)">
          <span>Portuguese (Português)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="es" onchange="selectLanguage(this)">
          <span>Spanish (Español)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="fr" onchange="selectLanguage(this)">
          <span>French (Français)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="te" onchange="selectLanguage(this)">
          <span>Telugu (తెలుగు)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="hi" onchange="selectLanguage(this)">
          <span>Hindi (हिन्दी)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="ta" onchange="selectLanguage(this)">
          <span>Tamil (தமிழ்)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="uz" onchange="selectLanguage(this)">
          <span>Uzbek (Oʻzbekcha)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="fil" onchange="selectLanguage(this)">
          <span>Filipino (Pilipino)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="zh-CN" onchange="selectLanguage(this)">
          <span>Mandarin (中文)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="ln" onchange="selectLanguage(this)">
          <span>Lingala</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="lg" onchange="selectLanguage(this)">
          <span>Luganda</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="vi" onchange="selectLanguage(this)">
          <span>Vietnamese (Tiếng Việt)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="gu" onchange="selectLanguage(this)">
          <span>Gujarati (ગુજરાતી)</span>
        </label>
        <label class="language-option">
          <input type="radio" name="language" value="tr" onchange="selectLanguage(this)">
          <span>Turkish (Türkçe)</span>
        </label>
      </div>
      <button class="confirm-btn" id="confirmBtn" onclick="confirmLanguage()" style="margin-top: 20px; width: 100%;" disabled>CONFIRM SELECTION</button>
    </div>
  </div>

  <!-- Translation Display Screen -->
  <div id="translationView">
    <div class="translation-display">
      <div class="language-label" id="selectedLanguageLabel">Translation</div>
      <div class="translation-text" id="translationText">Waiting for presenter to speak...</div>
    </div>
    <div class="status-indicator connected" id="statusIndicator">
      ✓ Connected
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, set, onValue, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBBi4kd19CAVxOIdZ5SADWLVyX4ozSio1Ss",
      authDomain: "district87-translation.firebaseapp.com",
      databaseURL: "https://district87-translation-default-rtdb.firebaseio.com",
      projectId: "district87-translation",
      storageBucket: "district87-translation.firebasestorage.app",
      messagingSenderId: "191653187271",
      appId: "1:191653187271:web:4cd11aa2134a7618a338e2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let sessionPin = '';
    let selectedLanguage = '';
    let connectionId = '';
    let lastTranslatedText = '';

    // Check if PIN is in URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlPin = urlParams.get('pin');
    
    if (urlPin) {
      document.getElementById('pinInput').value = urlPin;
    }

    window.joinSession = function() {
      const pin = document.getElementById('pinInput').value.trim();
      
      if (pin.length !== 4) {
        showError('Please enter a 4-digit PIN');
        return;
      }

      sessionPin = pin;
      
      // Check if session exists
      onValue(ref(db, `sessions/${sessionPin}/active`), (snapshot) => {
        if (snapshot.exists()) {
          document.getElementById('pinEntry').classList.remove('active');
          document.getElementById('languageSelection').classList.add('active');
          
          // Register connection
          connectionId = push(ref(db, `sessions/${sessionPin}/connections`)).key;
          set(ref(db, `sessions/${sessionPin}/connections/${connectionId}`), {
            timestamp: Date.now()
          });
        } else {
          showError('Session not found. Please check the PIN.');
        }
      }, { onlyOnce: true });
    };

    window.selectLanguage = function(radio) {
      document.querySelectorAll('.language-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      radio.closest('.language-option').classList.add('selected');
      selectedLanguage = radio.value;
      document.getElementById('confirmBtn').disabled = false;
    };

    window.confirmLanguage = function() {
      if (!selectedLanguage) return;
      
      const languageNames = {
        'pt': 'Portuguese',
        'es': 'Spanish',
        'fr': 'French',
        'te': 'Telugu',
        'hi': 'Hindi',
        'ta': 'Tamil',
        'uz': 'Uzbek',
        'fil': 'Filipino',
        'zh-CN': 'Mandarin',
        'ln': 'Lingala',
        'lg': 'Luganda',
        'vi': 'Vietnamese',
        'gu': 'Gujarati',
        'tr': 'Turkish'
      };
      
      document.getElementById('selectedLanguageLabel').textContent = languageNames[selectedLanguage];
      document.getElementById('languageSelection').classList.remove('active');
      document.getElementById('translationView').classList.add('active');
      
      // Listen for new text
      onValue(ref(db, `sessions/${sessionPin}/currentText`), (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          if (data.text && data.text !== lastTranslatedText) {
            lastTranslatedText = data.text;
            translateText(data.text);
          }
        }
      });
    };

    async function translateText(text) {
      try {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${selectedLanguage}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.responseStatus === 200 && data.responseData) {
          document.getElementById('translationText').textContent = data.responseData.translatedText;
        }
      } catch (error) {
        console.error('Translation error:', error);
        document.getElementById('translationText').textContent = 'Translation error. Please wait...';
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('pinError');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 3000);
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', function() {
      if (connectionId && sessionPin) {
        set(ref(db, `sessions/${sessionPin}/connections/${connectionId}`), null);
      }
    });
  </script>
</body>
</html>
